<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>AI Brand Deck Studio</h1>
            <p class="lead">{{ description }}</p>

            <form class="upload-form" action="/upload" method="post" enctype="multipart/form-data">
                <label>
                    Файл презентации или документа
                    <input type="file" name="file" required>
                </label>

                <label>
                    Тема презентации
                    <input type="text" name="topic" placeholder="Например: ремонтная программа филиала" required>
                </label>

                <label>
                    Тип презентации
                    <select name="deck_type" required>
                        <option value="Корпоративная презентация">Корпоративная презентация</option>
                        <option value="Проектный доклад">Проектный доклад</option>
                        <option value="Отчет">Отчет</option>
                        <option value="Обучающая презентация">Обучающая презентация</option>
                        <option value="Инвестиционное предложение">Инвестиционное предложение</option>
                        <option value="Коммерческое предложение">Коммерческое предложение</option>
                    </select>
                </label>

                <button type="submit">Создать презентацию</button>
            </form>
        </section>
    </main>
</body>
</html>
